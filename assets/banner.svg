<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B"/>
      <stop offset="50%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="url(#gridFade)" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
  </g>

  <!-- Decorative UI wireframes (left side) -->
  <g opacity="0.15">
    <!-- Button wireframe -->
    <rect x="80" y="100" width="120" height="40" rx="8" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <line x1="105" y1="120" x2="175" y2="120" stroke="#DAA520" stroke-width="1.5"/>

    <!-- Card wireframe -->
    <rect x="80" y="220" width="160" height="120" rx="12" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="92" y="232" width="136" height="60" rx="6" fill="#DAA520" fill-opacity="0.08"/>
    <line x1="92" y1="308" x2="180" y2="308" stroke="#DAA520" stroke-width="1"/>
    <line x1="92" y1="324" x2="150" y2="324" stroke="#DAA520" stroke-width="1"/>

    <!-- Nav wireframe -->
    <rect x="60" y="40" width="200" height="36" rx="6" fill="none" stroke="#DAA520" stroke-width="1"/>
    <circle cx="82" cy="58" r="8" fill="none" stroke="#DAA520" stroke-width="1"/>
    <line x1="100" y1="54" x2="130" y2="54" stroke="#DAA520" stroke-width="1"/>
    <line x1="100" y1="62" x2="120" y2="62" stroke="#DAA520" stroke-width="1"/>
  </g>

  <!-- Decorative UI wireframes (right side) -->
  <g opacity="0.12">
    <!-- Toggle wireframe -->
    <rect x="980" y="90" width="50" height="26" rx="13" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <circle cx="1017" cy="103" r="9" fill="#DAA520" fill-opacity="0.2" stroke="#DAA520" stroke-width="1"/>

    <!-- Input wireframe -->
    <rect x="960" y="140" width="180" height="36" rx="6" fill="none" stroke="#DAA520" stroke-width="1"/>
    <line x1="972" y1="158" x2="1040" y2="158" stroke="#DAA520" stroke-width="1"/>

    <!-- Modal wireframe -->
    <rect x="940" y="220" width="200" height="140" rx="12" fill="none" stroke="#DAA520" stroke-width="1"/>
    <line x1="960" y1="250" x2="1080" y2="250" stroke="#DAA520" stroke-width="0.5"/>
    <line x1="960" y1="280" x2="1100" y2="280" stroke="#DAA520" stroke-width="1"/>
    <line x1="960" y1="296" x2="1060" y2="296" stroke="#DAA520" stroke-width="1"/>
    <rect x="1040" y="325" width="80" height="24" rx="6" fill="#DAA520" fill-opacity="0.15" stroke="#DAA520" stroke-width="1"/>
  </g>

  <!-- Glow effects -->
  <ellipse cx="600" cy="200" rx="300" ry="150" fill="#DAA520" opacity="0.03"/>
  <ellipse cx="600" cy="200" rx="150" ry="80" fill="#DAA520" opacity="0.04"/>

  <!-- Gold accent line top -->
  <rect x="300" y="0" width="600" height="2" fill="url(#goldFade)"/>

  <!-- Main title -->
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="52" fill="url(#gold)" letter-spacing="4">
    GENESIS
  </text>

  <!-- Subtitle -->
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="22" fill="#ffffff" letter-spacing="12" opacity="0.9">
    UI/UX GOLD STANDARD
  </text>

  <!-- Divider line -->
  <rect x="480" y="220" width="240" height="1" fill="url(#gold)" opacity="0.5"/>

  <!-- Stats -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="15" fill="#888888" letter-spacing="3">
    28 TECHNIQUES  ·  5 ENGINES  ·  24 DATABASES
  </text>

  <!-- Author -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="13" fill="#DAA520" letter-spacing="5" opacity="0.7">
    BUILT BY MIGUEL JIMINEZ
  </text>

  <!-- Gold accent line bottom -->
  <rect x="300" y="398" width="600" height="2" fill="url(#goldFade)"/>

  <!-- Corner accents -->
  <path d="M0,0 L40,0 L40,2 L2,2 L2,40 L0,40 Z" fill="#DAA520" opacity="0.3"/>
  <path d="M1200,0 L1160,0 L1160,2 L1198,2 L1198,40 L1200,40 Z" fill="#DAA520" opacity="0.3"/>
  <path d="M0,400 L40,400 L40,398 L2,398 L2,360 L0,360 Z" fill="#DAA520" opacity="0.3"/>
  <path d="M1200,400 L1160,400 L1160,398 L1198,398 L1198,360 L1200,360 Z" fill="#DAA520" opacity="0.3"/>
</svg>
